name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ─── CHECKOUT ────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── BUILD FRONTEND ──────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm ci

      - name: Build frontend
        working-directory: Frontend
        run: npm run build

      # ─── BUILD BACKEND DOCKER IMAGE ──────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        working-directory: Backend
        run: docker build -t d1-backend:latest .

      - name: Save Docker image as tarball
        run: docker save d1-backend:latest | gzip > /tmp/d1-backend.tar.gz

      # ─── COPY FILES TO SERVER ────────────────────────────────────
      - name: Copy frontend build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "Frontend/dist/"
          target: "/var/www/d1/Frontend"
          strip_components: 2

      - name: Copy Docker image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "/tmp/d1-backend.tar.gz"
          target: "/tmp/"

      # ─── DEPLOY ON SERVER ────────────────────────────────────────
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            echo "=== Loading Docker image ==="
            docker load < /tmp/d1-backend.tar.gz
            rm /tmp/d1-backend.tar.gz

            echo "=== Restarting backend ==="
            cd /var/www/d1/Backend
            docker compose down
            docker compose up -d

            echo "=== Fixing permissions ==="
            sudo /usr/local/bin/d1-deploy-perms

            echo "=== Reloading Nginx ==="
            sudo systemctl reload nginx

            echo "=== Done ==="