name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build-check:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── CHECK FRONTEND ──────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm ci

      - name: Build frontend
        working-directory: Frontend
        run: npm run build

      # ─── CHECK BACKEND ───────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        working-directory: Backend
        run: docker build -f Dockerfile -t d1-backend:latest .

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-check        # only runs if build-check passes

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            echo "=== Fixing permissions FIRST ==="
            sudo /usr/local/bin/d1-***-perms

            echo "=== Pulling latest code ==="
            cd /var/www/d1
            git reset --hard HEAD
            git clean -fd
            git pull origin main

            echo "=== Building frontend ==="
            cd /var/www/d1/Frontend
            npm ci
            npm run build

            echo "=== Building & restarting backend ==="
            cd /var/www/d1/Backend
            docker compose -f docker-compose.yml down
            docker compose -f docker-compose.yml up -d --build

            echo "=== Reloading Nginx ==="
            sudo systemctl reload nginx

            echo "=== Done ==="
