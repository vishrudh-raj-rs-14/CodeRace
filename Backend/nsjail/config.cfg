# NsJail Configuration - Protocol Buffer Text Format

name: "sandbox"
description: "A secure, resource-limited Python 3 executor."

# Security & Isolation
mode: ONCE
hostname: "sandbox"
time_limit: 0
daemon: false

# Resource Limits

rlimit_nproc: 2
rlimit_as: 512
rlimit_cpu: 1
rlimit_fsize: 0
rlimit_nofile: 32

clone_newnet: true

use_cgroupv2: true
cgroupv2_mount: "/sys/fs/cgroup"
cgroup_pids_max: 5


# User/Group Mapping
uidmap {
    inside_id: "1000"
    outside_id: "nobody"
}
gidmap {
    inside_id: "1000"
    outside_id: "nogroup"
}

# --- Mount Points ---

# Essential System Libs
mount {
    src: "/lib"
    dst: "/lib"
    is_bind: true
    rw: false
}

mount {
    src: "/usr/lib"
    dst: "/usr/lib"
    is_bind: true
    rw: false
}

# Python Binary
mount {
    src: "/usr/bin/python3"
    dst: "/usr/bin/python3"
    is_bind: true
    rw: false
}



# Critical Device Nodes
mount {
    src: "/dev/urandom"
    dst: "/dev/urandom"
    is_bind: true
    rw: false
}
mount {
    src: "/dev/null"
    dst: "/dev/null"
    is_bind: true
    rw: true
}



# The binary to execute inside the jail
exec_bin {
  path: "/usr/bin/python3"
  arg: "-u"             # unbuffered stdout/stderr
  arg: "/sandbox/main.py"
}